<style id="chocolush-store-mobile">
/* ══════════════════════════════════════
   CHOCOLUSH STORE — MOBILE RESPONSIVE
   ══════════════════════════════════════ */

/* Fix horizontal overflow - the main issue */
html, body {
  overflow-x: hidden !important;
  max-width: 100vw;
}
*, *::before, *::after { box-sizing: border-box; }
#root { overflow-x: hidden; max-width: 100vw; }

@media (max-width: 767px) {
  /* All sections stay within viewport */
  section, header, footer, main, div {
    max-width: 100vw;
  }

  /* Prevent text overflow */
  h1, h2, h3, h4, p {
    word-break: break-word;
    overflow-wrap: break-word;
  }

  /* Fixed header stays full-width */
  header, nav, [class*="fixed top"] {
    width: 100vw !important;
    left: 0 !important;
    right: 0 !important;
  }

  /* Hero section */
  [class*="min-h-screen"] {
    width: 100% !important;
    overflow: hidden;
  }

  /* Product grid 2-col */
  .grid-cols-3, .grid-cols-4 {
    grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
  }

  /* No iOS zoom */
  input, select, textarea { font-size: 16px !important; }

  /* Touch targets */
  button { min-height: 44px; }

  /* Modals full width */
  [class*="max-w-md"], [class*="max-w-lg"] {
    max-width: calc(100vw - 1rem) !important;
    margin: 0.5rem auto !important;
  }
}

@media (min-width: 768px) and (max-width: 1023px) {
  .grid-cols-4 {
    grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
  }
}
</style>
